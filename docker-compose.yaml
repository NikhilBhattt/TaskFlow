version: "3.9"

services:
  app:
    build: .
    container_name: taskflow-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:8

    container_name: taskflow-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

    container_name: taskflow-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
